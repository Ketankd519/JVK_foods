<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/contact.css">

</head>
<body>
    <header>
        <a href="../index.html"><img src="../images/logo.png" class="logo" alt="JVK Foods Logo"></a>
        <div class="toggle"></div>
        <ul class="navigation">
            <li><a href="../index.html">Home</a></li>
            <li><a href="login.html">Menu</a></li>
            <li><a href="login.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </header>
    <main>
<br><br><br><br>
         <section>
        <div class="container">
            <div class="contactInfo">
                <div>
                    <h2>Contact Info</h2>
                    <ul class="info">
                        <li>
                            <span><img src="../images/location (1).png"></span>
                            <span>Om nagar, Nara road<br>
                                Jaripatka, Nagpur<br>
                                440030</span>
                        </li>
                        <li>
                            <span><img src="../images/mail.png"></span>
                            <span>jvkfoods@gmail.com</span>
                        </li>
                        <li>
                            <span><img src="../images/call.png"></span>
                            <span>957-875-2608</span>
                        </li>
                    </ul>
                </div> 

                <!-- <ul class="sci">
                    <p><iframe src="https://www.google.co.in/maps/place/Ginger+Mall/@21.1709453,79.0900328,15.25z/data=!4m6!3m5!1s0x3bd4c1233b3325cb:0x529bb4d3ad262a6!8m2!3d21.1770095!4d79.0890565!16s%2Fg%2F11csc8x67h?entry=ttu&g_ep=EgoyMDI1MTIwOS4wIKXMDSoKLDEwMDc5MjA2N0gBUAM%3D" frameborder="0"></iframe></p>
                </ul>    -->

            </div>

            <div class="contactForm">
                <h2>Send a Message</h2>
                <div class="formBox">
                    <div class="inputBox w50">
                        <input type="text" required>
                        <span>First Name</span>
                    </div>
                    <div class="inputBox w50">
                        <input type="text" required>
                        <span>Last Name</span>
                    </div>
                    <div class="inputBox w50">
                        <input type="email" required>
                        <span>Email Address</span>
                    </div>
                    <div class="inputBox w50">
                        <input type="number" required>
                        <span>Mobile Number</span>
                    </div>
                    <div class="inputBox w100">
                        <textarea required></textarea>
                        <span>Write Your Message here....</span>
                    </div>
                    <div class="inputBox w100">
                        <input type="submit" value="send">
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
    <footer>
        <div class="footer-content">
            <div class="social-icons">
                <a href="#" class="icon-btn"><ion-icon name="logo-instagram"></ion-icon></a>
                <a href="#" class="icon-btn"><ion-icon name="logo-facebook"></ion-icon></a>
                <a href="#" class="icon-btn"><ion-icon name="logo-twitter"></ion-icon></a>
            </div>
            <p>&copy; 2025 JVK Foods. All rights reserved.</p>
        </div>
    </footer>
    

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
        // Toggle navigation for mobile
        const toggle = document.querySelector('.toggle');
        const navigation = document.querySelector('.navigation');
        toggle.onclick = function() {
            toggle.classList.toggle('active');
            navigation.classList.toggle('active');
        }
    </script>
</body>
</html>
